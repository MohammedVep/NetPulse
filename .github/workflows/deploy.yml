name: deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Repository hygiene checks
        run: npm run check:repo-hygiene
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Install dependencies
        run: npm install
      - name: Production readiness checks
        run: npm run prod:check
      - name: Build workspace
        run: npm run build
      - name: Deploy selected stack
        run: npm run deploy:${{ github.event.inputs.environment }} --workspace @netpulse/cdk
      - name: Public demo smoke (staging)
        if: github.event.inputs.environment == 'staging'
        run: |
          npm run smoke:public-demo -- \
            --api staging=https://t5t1ojh1zj.execute-api.us-east-1.amazonaws.com \
            --frontend aws-staging=https://staging.dpl90cw6xnizn.amplifyapp.com \
            --frontend gcp-staging=https://np-web-staging-gcp-uknfwku4cq-uc.a.run.app
      - name: Public demo smoke (prod)
        if: github.event.inputs.environment == 'prod'
        run: |
          npm run smoke:public-demo -- \
            --api prod=https://qw4l1qrrle.execute-api.us-east-1.amazonaws.com \
            --frontend aws-prod=https://main.dpl90cw6xnizn.amplifyapp.com \
            --frontend gcp-prod=https://np-web-prod-gcp-pdfdlgnxtq-uc.a.run.app
