name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Repository hygiene checks
        run: npm run check:repo-hygiene
      - name: Install dependencies
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: CDK synth
        run: npm run cdk:synth
      - name: Production readiness checks
        run: npm run prod:check
      - name: Public demo smoke
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          npm run smoke:public-demo -- \
            --api staging=https://t5t1ojh1zj.execute-api.us-east-1.amazonaws.com \
            --api prod=https://qw4l1qrrle.execute-api.us-east-1.amazonaws.com \
            --frontend aws-staging=https://staging.dpl90cw6xnizn.amplifyapp.com \
            --frontend aws-prod=https://main.dpl90cw6xnizn.amplifyapp.com \
            --frontend gcp-staging=https://np-web-staging-gcp-uknfwku4cq-uc.a.run.app \
            --frontend gcp-prod=https://np-web-prod-gcp-pdfdlgnxtq-uc.a.run.app
