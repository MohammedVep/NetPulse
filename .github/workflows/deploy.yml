name: deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Repository hygiene checks
        run: npm run check:repo-hygiene
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Install dependencies
        run: npm install
      - name: Production readiness checks
        run: npm run prod:check
      - name: Build workspace
        run: npm run build
      - name: Deploy selected stack
        run: npm run deploy:${{ github.event.inputs.environment }} --workspace @netpulse/cdk
